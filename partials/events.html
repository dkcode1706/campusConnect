<div class="container mt-5">

    <h2 class="mb-4">Upcoming Events</h2>

    <div class="row">

        <div class="col-md-4 mb-4" ng-repeat="event in events">

            <div class="card shadow">

                <div class="card-body">

                    <h4>{{event.name}}</h4>

                    <p>Date : {{event.date}}</p>

                    <p>Category : {{event.category}}</p>

                    <a class="btn btn-primary w-100" href="#!/register/{{event.id}}">

                        Register Now

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
