<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white text-center">

                    <h2>Event Registration</h2>

                </div>

                <div class="card-body p-4">

                    <form name="registerForm" ng-submit="submitRegistration()">

                        <div class="mb-3">
                            <label>Full Name</label>

                            <input type="text" class="form-control" ng-model="student.name" required>

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email" class="form-control" ng-model="student.email" required>

                        </div>

                        <div class="mb-3">

                            <label>Roll Number</label>

                            <input type="text" class="form-control" ng-model="student.roll" required>

                        </div>

                        <div class="mb-3">

                            <label>Department</label>

                            <select class="form-select" ng-model="student.department" required>

                                <option value="">Select Department</option>

                                <option>CSE</option>

                                <option>IT</option>

                                <option>ECE</option>

                                <option>EEE</option>

                                <option>Mechanical</option>

                                <option>Civil</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label>Year</label>

                            <select class="form-select" ng-model="student.year" required>

                                <option>1st Year</option>

                                <option>2nd Year</option>

                                <option>3rd Year</option>

                                <option>4th Year</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label>Phone Number</label>

                            <input type="tel" class="form-control" ng-model="student.phone" required>

                        </div>

                        <div class="mb-3">

                            <label>Event ID</label>

                            <input class="form-control" value="{{eventId}}" readonly>

                        </div>

                        <button class="btn btn-success w-100">

                            Register Event

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
